<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVtuber Web 🌸</title>
    <style>
        :root {
            --primary: #ffc0cb;
            --dark: #1a1a1a;
            --accent: #ff7eb9;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 192, 203, 0.3);
            border: 2px solid var(--primary);
            overflow: hidden;
        }
        img#stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        input {
            background: transparent;
            border: 1px solid var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
        }
        button {
            background: var(--primary);
            border: none;
            color: var(--dark);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: var(--accent);
            transform: scale(1.05);
        }
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: var(--primary);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1 style="color: var(--primary); margin-bottom: 10px;">EasyVtuber Live 🌸</h1>

    <div class="container">
        <div class="badge">Live Stream</div>
        <img id="stream" src="" alt="Live Stream (Connect to Local Backend)">
    </div>

    <div class="controls">
        <input type="text" id="ipAddress" placeholder="Local IP (e.g. localhost)">
        <button onclick="connect()">Connect</button>
    </div>

    <div class="status" id="status">Waiting for connection...</div>

    <script>
        function connect() {
            const ip = document.getElementById('ipAddress').value || 'localhost';
            const streamImg = document.getElementById('stream');
            const status = document.getElementById('status');
            
            const streamUrl = `http://${ip}:8000/`;
            streamImg.src = streamUrl;
            
            status.innerText = `Connecting to ${streamUrl}...`;
            
            streamImg.onload = () => {
                status.innerText = "🌸 Connected & Streaming";
            };
            
            streamImg.onerror = () => {
                status.innerText = "❌ Connection Failed. Make sure EasyVtuber is running with Web Output.";
                streamImg.src = "";
            };
        }

        // Auto-connect to localhost on start
        window.onload = connect;
    </script>
</body>
</html>
