<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVtuber Elite 🌸</title>
    <link rel="stylesheet" href="css/jquery-ui.css">
    <style>
        :root {
            --primary: #ffc0cb;
            --accent: #ff69b4;
            --dark: #0f0f12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar & Controls --- */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
        }

        .profile-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
        }

        select, input[type="button"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:hover, input[type="button"]:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
        }

        /* --- Main Stage --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .viewport-container {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .viewport {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 192, 203, 0.15);
            position: relative;
        }

        .viewport::after {
            content: "LIVE";
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        canvas {
            display: block;
        }

        #videoCanvas {
            border-radius: 15px;
            opacity: 0.8;
        }

        .stats {
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            color: var(--primary);
        }

        /* --- Custom Sliders --- */
        .ui-slider {
            background: rgba(255, 255, 255, 0.1) !important;
            border: none !important;
            height: 6px !important;
            border-radius: 10px !important;
        }
        .ui-slider-handle {
            background: var(--primary) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 16px !important;
            height: 16px !important;
            top: -5px !important;
            outline: none !important;
        }

        /* --- Windows 11 Spinner --- */
        .win11-spinner {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto;
        }

        .win11-spinner .dot {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: win11-spin 2.5s infinite;
        }

        .win11-spinner .dot::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
        }

        .win11-spinner .dot:nth-child(1) { animation-delay: 0.1s; }
        .win11-spinner .dot:nth-child(2) { animation-delay: 0.2s; }
        .win11-spinner .dot:nth-child(3) { animation-delay: 0.3s; }
        .win11-spinner .dot:nth-child(4) { animation-delay: 0.4s; }
        .win11-spinner .dot:nth-child(5) { animation-delay: 0.5s; }

        @keyframes win11-spin {
            0% { transform: rotate(225deg); opacity: 1; animation-timing-function: ease-out; }
            7.5% { transform: rotate(345deg); animation-timing-function: linear; }
            30% { transform: rotate(455deg); animation-timing-function: ease-in-out; }
            40% { transform: rotate(570deg); animation-timing-function: linear; }
            70% { transform: rotate(710deg); animation-timing-function: ease-in-out; opacity: 1; }
            75% { transform: rotate(825deg); animation-timing-function: ease-out; }
            100% { transform: rotate(945deg); opacity: 0; }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .viewport-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Hidden Required Elements for the JS Bundle to function -->
<input type="hidden" id="pageName" value="main">
<div id="hidden-required-elements" style="display:none">
    <div id="irisSizeRightSlider"></div>
    <div id="breathingFrequencySlider"></div>
    <div id="breathingProgressBar"></div>
    <input id="smileThresholdMinSpinner">
    <input id="smileThresholdMaxSpinner">
    <input id="eyeSurprisedMaxSpinner">
    <input id="eyeBlinkMaxSpinner">
    <input id="eyebrowDownMaxSpinner">
    <input id="cheekSquintMinSpinner">
    <input id="cheekSquintMaxSpinner">
    <input id="jawOpenMinSpinner">
    <input id="jawOpenMaxSpinner">
    <input id="mouthFrownMaxSpinner">
    <input id="mouthFunnelMinSpinner">
    <input id="mouthFunnelMaxSpinner">
</div>

<div id="loading">
    <div style="text-align:center">
        <div class="win11-spinner" style="margin-bottom:20px;">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div style="color:var(--primary); font-size:12px; letter-spacing:2px; font-weight:bold;">INITIALIZING ELITE ENGINE</div>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">EasyVtuber 🌸</div>
    
    <div class="profile-card">
        <div class="control-label">Welcome Back</div>
        <div id="userName" style="font-weight: bold; font-size: 18px;">Senpai</div>
        <div id="lastUsedText" style="font-size: 11px; color: var(--accent); margin-top: 5px;">Ready for Elite VTubing</div>
    </div>

    <div class="control-group">
        <div class="control-label">Brain & Performance</div>
        <select id="perfModeSelector">
            <option value="potato">🥔 Potato (Legacy Mode)</option>
            <option value="balanced" selected>⚖️ Balanced Performance</option>
            <option value="elite">💎 Elite (Hardware Accelerated)</option>
        </select>
    </div>

    <div class="control-group">
        <div class="control-label">Face Settings</div>
        <select name="eyebrowDownModeSelector" id="eyebrowDownModeSelector">
            <option value="ANGRY" selected>ANGRY</option>
            <option value="TROUBLED">TROUBLED</option>
            <option value="SERIOUS">SERIOUS</option>
            <option value="LOWERED">LOWERED</option>
        </select>
        <select name="winkModeSelector" id="winkModeSelector" style="margin-top: 5px;">
            <option value="NORMAL" selected>NORMAL WINK</option>
            <option value="RELAXED">RELAXED WINK</option>                            
        </select>
    </div>

    <div class="control-group">
        <div class="control-label">Iris Calibration</div>
        <div id="irisSizeLeftSlider" style="margin: 15px 0;"></div>
        <label style="font-size: 12px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="linkLeftRightIrisesCheckbox" checked> Mirror Eyes
        </label>
    </div>

    <div class="control-group">
        <div class="control-label">Advanced Actions</div>
        <input type="button" id="calibrateFaceOrientationButton" value="🎯 Calibrate View">
        <input type="button" id="restartBreathingCycleButton" value="🫁 Reset Breathing" style="margin-top: 5px;">
    </div>
</aside>

<main class="main-content">
    <div class="viewport-container">
        <!-- Input Preview -->
        <div class="viewport" style="width: 320px; border-radius: 20px;">
            <video id="video" style="display:none"></video>
            <canvas id="videoCanvas" width="640" height="480" style="width:100%; height:auto;"></canvas>
            <div style="position: absolute; bottom: 10px; left: 20px; font-size: 10px; opacity: 0.5;">INPUT TRACKING</div>
        </div>

        <!-- Output Avatar -->
        <div class="viewport" style="width: 512px; height: 512px;">
            <canvas id="outputImage" width="512" height="512"></canvas>
        </div>
    </div>

    <div class="stats" id="inferrenceTimeCell">Initializing Elite Engine...</div>

    <div class="control-group" style="margin-top: 30px; width: 320px;">
        <div class="control-label" style="text-align: center;">Active Avatar</div>
        <select name="characterSelect" id="characterSelector">
            <option value="lambda_chan" selected>Lambda-chan</option>
            <option value="lambda_san">Lambda-san</option>
            <option value="haru">Haru</option>
            <option value="kisaragi_asato">Kisaragi Asato</option>
            <option value="koakuma_mei">Koakuma Mei</option>
            <option value="marietta">Marietta</option>
            <option value="ponytail_girl">Ponytail Girl</option>
            <option value="taoist_boy">Taoist Boy</option>
            <option value="touhoku_itako">Touhoku Itako</option>
            <option value="touhoku_kiritan">Touhoku Kiritan</option>
            <option value="touhoku_zunko">Touhoku Zunko</option>
            <option value="yukiwarisou_no_majo">Yukiwarisou no Majo</option>
            <option value="zundamon">Zundamon</option>
        </select>
    </div>
</main>

<script src="index.bundle.js?v=elite.1.0"></script>
<script>
    // --- Account & Persistence Logic ---
    const STORAGE_KEY = 'easyvtuber_user_data';
    const characterSelector = document.getElementById('characterSelector');
    const perfSelector = document.getElementById('perfModeSelector');
    const lastUsedDisplay = document.getElementById('lastUsedText');

    function loadSavedData() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        if (rawData) {
            const data = JSON.parse(rawData);
            if (data.lastCharacter) characterSelector.value = data.lastCharacter;
            if (data.performanceMode) perfSelector.value = data.performanceMode;
            lastUsedDisplay.innerText = `Last seen with ${characterSelector.options[characterSelector.selectedIndex].text}`;
            applyPerformanceSettings(data.performanceMode);
        }
    }

    function saveData() {
        const data = {
            lastCharacter: characterSelector.value,
            performanceMode: perfSelector.value,
            timestamp: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function applyPerformanceSettings(mode) {
        const outputCanvas = document.getElementById('outputImage');
        if (mode === 'potato') {
            outputCanvas.style.width = '384px';
            outputCanvas.style.height = '384px';
        } else {
            outputCanvas.style.width = '512px';
            outputCanvas.style.height = '512px';
        }
    }

    characterSelector.addEventListener('change', () => {
        saveData();
        lastUsedDisplay.innerText = `Active: ${characterSelector.options[characterSelector.selectedIndex].text}`;
    });

    perfSelector.addEventListener('change', () => {
        saveData();
        applyPerformanceSettings(perfSelector.value);
    });

    loadSavedData();
    autoDetectElite();

    function autoDetectElite() {
        if (location.protocol === 'https:') {
            const guidanceDiv = document.createElement('div');
            guidanceDiv.style.cssText = "background: #ff4757; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 13px; text-align: center; border: 1px solid rgba(255,255,255,0.2);";
            guidanceDiv.innerHTML = `
                <b>⚠️ Connection Tip:</b><br>
                If tracking doesn't start, please click the <b>Lock (🔒)</b> in your address bar,<br>
                go to <b>Site Settings</b>, and set <b>"Insecure content"</b> to <b>Allow</b>.
            `;
            document.querySelector('.sidebar').appendChild(guidanceDiv);
        }
    }
</script>
</body>
</html>
