<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVtuber Elite v2 🌸 | Raiden Shogun</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #ffc0cb;
            --accent: #ff69b4;
            --dark-bg: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.85);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --neon-glow: 0 0 15px rgba(255, 192, 203, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 105, 180, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 192, 203, 0.08) 0%, transparent 40%);
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 340px;
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 100;
            box-shadow: 15px 0 40px rgba(0,0,0,0.6);
        }

        .logo-area {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(255, 105, 180, 0.15);
            color: var(--primary);
            border: 1px solid rgba(255, 105, 180, 0.3);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 8px;
        }

        select, .btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 18px;
            border-radius: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-family: inherit;
        }

        select:hover, .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff1493);
            border: none;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 20, 147, 0.4);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .viewport-container {
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .preview-card {
            width: 320px;
            aspect-ratio: 4/3;
        }

        .render-card {
            width: 512px;
            height: 512px;
            border: 1px solid rgba(255, 192, 203, 0.15);
        }

        .live-tag {
            position: absolute;
            top: 24px;
            right: 24px;
            background: #ff4757;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        /* --- Stats --- */
        .stats-overlay {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 50px;
            background: rgba(0,0,0,0.4);
            padding: 15px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .stat-box { text-align: center; }
        .stat-num { font-size: 20px; font-weight: 700; color: var(--primary); }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        /* --- Overlays --- */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(255, 192, 203, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        #debugConsole {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-height: 200px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            padding: 15px;
            overflow-y: auto;
            color: #00ff88;
            z-index: 500;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas { display: block; }
        video { display: none; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div style="letter-spacing: 6px; font-weight: 800; color: var(--primary); font-size: 16px;">V2 ELITE CORE BOOTING</div>
    <div id="loadDetail" style="color: var(--text-dim); font-size: 12px; margin-top: 15px;">Awaiting User Command...</div>
    <button id="bootBtn" class="btn btn-primary" style="margin-top: 30px; width: auto; padding: 15px 45px;">INITIATE ETERNITY</button>
</div>

<aside class="sidebar">
    <div class="logo-area">
        <div class="logo-text">EasyVtuber V2</div>
        <div class="status-badge">TS/WASM OPTIMIZED</div>
    </div>

    <div class="control-group">
        <div class="section-label">Character Core</div>
        <select id="charSelector">
            <option value="lambda_chan" selected>Lambda-chan (Standard)</option>
            <option value="lambda_san">Lambda-san</option>
            <option value="haru">Haru</option>
            <option value="marietta">Marietta</option>
            <option value="zundamon">Zundamon</option>
        </select>
    </div>

    <div class="control-group">
        <div class="section-label">Neural Engine</div>
        <select id="engineSelector">
            <option value="webgpu">WebGPU (Experimental)</option>
            <option value="webgl" selected>WebGL Accelerated</option>
            <option value="cpu">CPU (Safety Mode)</option>
        </select>
    </div>

    <div class="control-group" style="margin-top: auto;">
        <button id="calibBtn" class="btn">🎯 Calibrate Pose</button>
        <button id="toggleDebugBtn" class="btn" style="margin-top: 10px;">🛡️ Toggle Debug</button>
    </div>
</aside>

<main class="main-content">
    <div class="viewport-container">
        <!-- AI Tracking -->
        <div class="glass-card preview-card">
            <div class="live-tag" style="background: var(--primary);">TRACKING</div>
            <video id="inputVideo" autoplay muted playsinline></video>
            <canvas id="trackingCanvas" width="640" height="480" style="width: 100%; height: auto;"></canvas>
        </div>

        <!-- Character Render -->
        <div class="glass-card render-card">
            <div class="live-tag">ELITE RENDER</div>
            <canvas id="renderCanvas" width="512" height="512" style="width: 100%; height: 100%;"></canvas>
        </div>
    </div>

    <div class="stats-overlay">
        <div class="stat-box">
            <div class="stat-num" id="inferenceTime">--</div>
            <div class="stat-lab">Inference (ms)</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="fpsNum">--</div>
            <div class="stat-lab">Engine FPS</div>
        </div>
    </div>
</main>

<div id="debugConsole"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
